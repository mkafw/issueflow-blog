name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Issues to Content
        run: |
          node scripts/sync-issues.js \
            --repo "${{ github.repository }}" \
            --output "./content/generated" \
            --token "${{ secrets.GITHUB_TOKEN }}"

      - name: Generate Pages
        run: |
          node scripts/generate-pages.js \
            --input "./content/generated" \
            --output "./app"

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Requires `output: 'export'` in next.config.ts to produce ./out
          # Fumadocs UI CSS variables need SSR — prefer Netlify deploy instead
          path: './out'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
