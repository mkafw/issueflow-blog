name: Sync Issue to Blog (GitHub Pages)

on:
  issues:
    types: [closed]

permissions:
  contents: write
  issues: read
  pages: write
  id-token: write

jobs:
  sync-issue-to-blog:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract Issue metadata
        id: issue-meta
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          ISSUE_URL="${{ github.event.issue.html_url }}"
          CLOSED_AT="${{ github.event.issue.closed_at }}"
          
          # 生成文件名
          FILE_NAME=$(echo "$ISSUE_TITLE" | \
            tr '[:upper:]' '[:lower:]' | \
            sed 's/[^a-z0-9 ]//g' | \
            tr ' ' '-' | \
            sed 's/-\+/-/g' | \
            sed 's/^-//;s/-$//')
          
          DATE_PREFIX=$(date +%Y-%m-%d)
          FINAL_FILE_NAME="${DATE_PREFIX}-${FILE_NAME}.md"
          
          echo "issue_number=${ISSUE_NUMBER}" >> $GITHUB_OUTPUT
          echo "issue_title=${ISSUE_TITLE}" >> $GITHUB_OUTPUT
          echo "file_name=${FINAL_FILE_NAME}" >> $GITHUB_OUTPUT
          echo "issue_url=${ISSUE_URL}" >> $GITHUB_OUTPUT
          echo "closed_at=${CLOSED_AT}" >> $GITHUB_OUTPUT

      - name: Create Markdown file
        run: |
          CONTENT_PATH="content/docs/${{ steps.issue-meta.outputs.file_name }}"
          mkdir -p "$(dirname "$CONTENT_PATH")"
          
          cat > "$CONTENT_PATH" << EOF
          ---
          title: "${{ steps.issue-meta.outputs.issue_title }}"
          description: "Synced from GitHub Issue #${{ steps.issue-meta.outputs.issue_number }}"
          date: ${{ steps.issue-meta.outputs.closed_at }}
          source: "${{ steps.issue-meta.outputs.issue_url }}"
          draft: false
          ---
          
          ${{ github.event.issue.body }}
          
          ---
          
          > 📌 本文源自 GitHub Issue #${{ steps.issue-meta.outputs.issue_number }}
          > [查看原始 Issue](${{ steps.issue-meta.outputs.issue_url }})
          EOF

      - name: Build website
        run: |
          npm run build
          echo "✓ 构建完成"

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet content/docs/ out/ 2>/dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.git-check.outputs.has_changes == 'true'
        run: |
          git add content/docs/
          git commit -m "docs: sync Issue #${{ steps.issue-meta.outputs.issue_number }}

          - Title: ${{ steps.issue-meta.outputs.issue_title }}
          - Source: ${{ steps.issue-meta.outputs.issue_url }}"
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment on Issue
        if: steps.git-check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const repo = context.repo;
            const ghPagesUrl = `https://${repo.owner}.github.io/${repo.repo}/`;
            
            await github.rest.issues.createComment({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: issueNumber,
              body: `## ✅ 已发布到 GitHub Pages\n\n🌐 **网站**: [${ghPagesUrl}](${ghPagesUrl})\n📄 **文件**: \`content/docs/${{ steps.issue-meta.outputs.file_name }}\`\n\n---\n\n*此评论由 Issueflow-Blog 自动创建*`
            });